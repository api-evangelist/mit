apis:
  - aid: mit:roles
    name: MIT Roles API
    description: >-
      The MIT Roles API provides programmatic access to institutional role and
      authorization data, enabling MIT applications and authorized integrators
      to query, manage, and synchronize roles assigned to people and groups
      across MIT systems. The Roles API is published through MIT's developer
      portal and is gated behind MIT Touchstone / Shibboleth authentication.
