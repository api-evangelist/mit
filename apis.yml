aid: mit
name: MIT
description: >-
  The Massachusetts Institute of Technology (MIT) operates an internal
  developer portal that exposes APIs for the institution's information
  systems. The MIT developer environment publishes APIs such as the Roles API
  for managing institutional roles and authorizations. Access to the
  developer portal and most APIs requires MIT authentication via Shibboleth /
  Touchstone single sign-on, making the catalog primarily available to
  community members, partners, and authorized integrators rather than to the
  general public.
